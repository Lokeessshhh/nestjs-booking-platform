services:
  - type: web
    name: en2h-booking-api
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    region: ohio # Default region, can be changed
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true # Render will automatically generate a secure random secret
      - key: JWT_REFRESH_SECRET
        generateValue: true # Render will automatically generate a secure random secret
      - key: JWT_ACCESS_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
